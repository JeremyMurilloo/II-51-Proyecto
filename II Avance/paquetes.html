<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mis Paquetes — Casillero Internacional</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Estilos propios -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <div class="brand-icon">📦</div>
        <div class="brand-name">
          Casillero
          <span>Internacional CR</span>
        </div>
      </a>
      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse" data-bs-target="#mainNav"
        aria-controls="mainNav" aria-expanded="false" aria-label="Abrir menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <li class="nav-item"><a class="nav-link fw-semibold" href="dashboard_cliente.html">Mi dashboard</a></li>
          <li class="nav-item"><a class="nav-link fw-semibold" href="rastreo.html">Rastrear</a></li>
          <li class="nav-item">
            <button class="btn btn-outline-danger btn-sm px-3" id="btnCerrarSesion">Cerrar sesion</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Encabezado -->
  <div class="dashboard-saludo py-4">
    <div class="container">
      <h2 class="fw-bold mb-0">Mis paquetes</h2>
      <p class="text-muted mb-0 mt-1">Consulta el estado de todos tus envios registrados</p>
    </div>
  </div>

  <main class="py-4">
    <div class="container">

      <!-- Filtros por estado -->
      <div class="d-flex gap-2 flex-wrap mb-4">
        <button class="btn btn-filtro activo" data-filtro="todos">Todos</button>
        <button class="btn btn-filtro" data-filtro="en_transito">En transito</button>
        <button class="btn btn-filtro" data-filtro="recibido">Recibido</button>
        <button class="btn btn-filtro" data-filtro="entregado">Entregado</button>
      </div>

      <!-- Spinner de carga -->
      <div id="spinnerPaquetes" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Cargando...</span>
        </div>
        <p class="mt-3 text-muted">Cargando tus paquetes...</p>
      </div>

      <!-- Lista de paquetes -->
      <div id="listaPaquetes"></div>

    </div>
  </main>

  <!-- Modal de detalle del paquete -->
  <div class="modal fade" id="modalDetalle" tabindex="-1" aria-labelledby="modalDetalleLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content registro-card">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" id="modalDetalleLabel" style="color:var(--color-primary-dark)">
            Detalle del paquete
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body" id="modalDetalleBody">
          <!-- Se llena dinamicamente desde paquetes.js -->
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer mt-5">
    <div class="footer-bottom text-center py-3">
      &copy; 2026 Casillero Internacional &mdash; Todos los derechos reservados
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Logica de paquetes -->
  <script type="module" src="paquetes.js"></script>

</body>
</html>
